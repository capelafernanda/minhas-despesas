<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Despesas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <meta name="theme-color" content="#ff66b3" />
</head>
<body>
  <h1>Minhas Despesas</h1>

  <div class="card">
    <input id="descricao" type="text" placeholder="Descrição" />
    <input id="valor" type="number" placeholder="Valor (R$)" />
    <input id="mes" type="month" />
    <button id="adicionar">Adicionar</button>
  </div>

  <h3>Filtrar por mês:</h3>
  <input id="filtroMes" type="month" />

  <ul id="lista"></ul>

  <h2 id="total"></h2>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(() => console.log("Service Worker registrado com sucesso!"))
        .catch((error) => console.log("Erro ao registrar Service Worker:", error));
    }
  </script>
</body>
</html>
