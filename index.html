<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Despesas</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#16a34a" />
</head>
<body>

  <h1>Minhas Despesas</h1>

  <div class="card">
    <input id="descricao" type="text" placeholder="Descrição" />
    <input id="valor" type="number" placeholder="Valor (R$)" />
    <input id="mes" type="month" />
    <button id="adicionar">Adicionar</button>
  </div>

  <h3>Filtrar por mês:</h3>
  <input id="filtroMes" type="month" />

  <ul id="lista"></ul>

  <h2 id="total"></h2>

  <h3>Gráfico de Despesas</h3>
  <canvas id="meuGrafico"></canvas>

  <script src="script.js" defer></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(() => console.log("Service Worker registrado!"))
        .catch((error) => console.log("Erro:", error));
    }
  </script>

</body>
</html>
